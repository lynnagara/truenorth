llm:
  # LOCAL or ANTHROPIC
  provider: ANTHROPIC
  model: claude-haiku-4-5
  # only used if provider is Anthropic, Ollama ignores max_tokens
  max_tokens: 2000
  temperature: 0.2

embeddings:
  provider: LOCAL

execution:
  # NOTIFY_ONLY | AUTONOMOUS
  autonomy: AUTONOMOUS
  # PAPER -> LIVE
  trading: PAPER

cache:
  fundamentals_ttl_hours: 24

experiments:
  primary: swing_news_fundamentals
  additional: [conviction_news]

risk_management:
  min_position_pct: 0.03
  max_position_pct: 0.10
  max_daily_buys: 5
  buy_threshold: 0.65   # signal must be >= buy_threshold to open a position
  sell_threshold: 0.0  # signal must be <= sell_threshold to close a position
  entry_update_threshold: 0.02  # cancel and reissue pending buy if suggested entry drifts by more than this fraction
  target_update_threshold: 0.05  # cancel and reissue take-profit if suggested target drifts by more than this fraction
  max_entry_discount: 0.05  # skip buy if model's suggested entry is more than this fraction below last price
