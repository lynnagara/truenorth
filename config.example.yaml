llm:
  # LOCAL or ANTHROPIC
  provider: LOCAL
  model: llama3.2
  # only used if provider is Anthropic, Ollama ignores max_tokens
  max_tokens: 2000

embeddings:
  provider: LOCAL

execution:
  # NOTIFY_ONLY -> REQUIRE_APPROVAL -> AUTONOMOUS
  autonomy: NOTIFY_ONLY
  # PAPER -> LIVE
  trading: PAPER

risk_management:
  min_position_pct: 0.03
  max_position_pct: 0.10
  max_daily_buys: 5
  min_buy_confidence: 0.65
