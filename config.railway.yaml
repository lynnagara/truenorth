llm:
  provider: ANTHROPIC
  model: claude-haiku-4-5 # test on cheapest model
  max_tokens: 2000

embeddings:
  provider: LOCAL

execution:
  # NOTIFY_ONLY -> REQUIRE_APPROVAL -> AUTONOMOUS
  autonomy: NOTIFY_ONLY
  # PAPER -> LIVE
  trading: PAPER

experiments:
  primary: basic_fundamentals
  additional: [swing_news_fundamentals]

risk_management:
  min_position_pct: 0.03
  max_position_pct: 0.10
  max_daily_buys: 5
  buy_threshold: 0.65   # signal must be >= buy_threshold to open a position
  sell_threshold: -0.3  # signal must be <= sell_threshold to close a position
  entry_update_threshold: 0.02  # cancel and reissue pending buy if suggested entry drifts by more than this fraction
  target_update_threshold: 0.05  # cancel and reissue take-profit if suggested target drifts by more than this fraction
  max_entry_discount: 0.05  # skip buy if model's suggested entry is more than this fraction below last price
